 function bmark(n){var b=BLOGO[n]||['#2b3138',n,''];
  var txt='<span class="tc-bw" style="color:'+b[0]+'">'+b[1]+'</span>';
  if(b[2]){return '<img class="tc-bimg" src="'+b[2]+'" alt="'+n.replace(/"/g,'&quot;')+'">';}
  return txt;}
 var box=document.querySelector('.tcat'),grid=document.getElementById('tcGrid'),empty=document.getElementById('tcEmpty'),cnt=document.getElementById('tcCount'),moreBtn=document.getElementById('tcMore');
 var st={brand:'all',case:'all',area:'all',inv:'',fresh:false,q:'',sort:'pop'},shown=PAGE,filtered=[];
 function ph(){return 'data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="220" height="180"><rect width="220" height="180" fill="#f0f1f3"/><text x="110" y="95" font-family="Arial" font-size="13" fill="#bfc4cc" text-anchor="middle">фото добавим</text></svg>');}
 function inArea(a){if(st.area==='all')return true;var p=st.area.split('-');return a>=+p[0]&&a<=+p[1];}
 function match(p){
  if(st.brand!=='all'&&p.brand!==st.brand)return false;
  if(st.case!=='all'&&p.case!==st.case)return false;
  if(!inArea(p.area))return false;
  if(st.inv&&p.inv!==st.inv)return false;
  if(st.fresh&&!p.fresh)return false;
  if(st.q){var s=(p.name+' '+p.brand+' '+p.art).toLowerCase();if(s.indexOf(st.q)<0)return false;}
  return true;
 }
 function sortList(a){
  if(st.sort==='asc')a.sort(function(x,y){return x.pn-y.pn});
  else if(st.sort==='desc')a.sort(function(x,y){return y.pn-x.pn});
  else if(st.sort==='area')a.sort(function(x,y){return x.area-y.area});
  else a.sort(function(x,y){return (x.instock?0:1)-(y.instock?0:1)||x.pn-y.pn});
  return a;
 }
 function card(p,i){
  var pills=(p.pills||[]).map(function(x){return '<span class="tc-pill">'+x+'</span>'}).join('');
  return '<div class="tc-card" data-i="'+i+'"><div class="tc-imgbox"><span class="tc-st '+p.sc+'">'+p.stock+'</span>'+
   '<img loading="lazy" referrerpolicy="no-referrer" src="'+p.img+'" alt="'+p.name.replace(/"/g,'&quot;')+'" onerror="this.onerror=null;this.src=\''+ph()+'\'"></div>'+
   '<div class="tc-cb"><div class="tc-brand">'+bmark(p.brand)+'</div><div class="tc-name">'+p.name+'</div>'+
   (pills?'<div class="tc-pills">'+pills+'</div>':'')+'<div class="tc-price">'+(p.price||'')+'</div><div class="tc-cta">Подробнее →</div></div></div>';
 }
 function render(reset){
  if(reset!==false){filtered=sortList(DATA.filter(match));shown=PAGE;}
  grid.innerHTML=filtered.slice(0,shown).map(function(p){return card(p,DATA.indexOf(p))}).join('');
  empty.style.display=filtered.length?'none':'block';
  cnt.textContent='Показано '+Math.min(shown,filtered.length)+' из '+filtered.length;
  moreBtn.parentNode.style.display=filtered.length>shown?'flex':'none';
 }
 box.querySelectorAll('.tc-chip').forEach(function(ch){ch.addEventListener('click',function(){
   var f=ch.getAttribute('data-f'),v=ch.getAttribute('data-v');
   if(f==='inv'||f==='fresh'){var on=ch.classList.toggle('is-on');if(f==='fresh')st.fresh=on;else st.inv=on?v:'';
     if(f==='inv'&&on)box.querySelectorAll('.tc-chip[data-f=inv]').forEach(function(o){if(o!==ch)o.classList.remove('is-on')});render();return;}
   st[f]=v;box.querySelectorAll('.tc-chip[data-f="'+f+'"]').forEach(function(o){o.classList.remove('is-on')});ch.classList.add('is-on');render();
 });});
 document.getElementById('tcQ').addEventListener('input',function(e){st.q=e.target.value.trim().toLowerCase();render();});
 document.getElementById('tcSort').addEventListener('change',function(e){st.sort=e.target.value;render();});
 moreBtn.addEventListener('click',function(){shown+=PAGE;render(false);});
 document.getElementById('tcReset').addEventListener('click',function(){
   st={brand:'all',case:'all',area:'all',inv:'',fresh:false,q:'',sort:'pop'};
   document.getElementById('tcQ').value='';document.getElementById('tcSort').value='pop';
   box.querySelectorAll('.tc-chip').forEach(function(o){o.classList.remove('is-on')});
   box.querySelectorAll('.tc-chip[data-v=all]').forEach(function(o){o.classList.add('is-on')});render();
 });
 var modal=document.getElementById('tcModal');
 function open(p){
  document.getElementById('tcMB').innerHTML=bmark(p.brand);
  var mc=document.getElementById('tcMC');mc.textContent=p.case||'';mc.style.display=p.case?'':'none';
  document.getElementById('tcMN').textContent=p.name;document.getElementById('tcMP').textContent=p.price||'';
  var ms=document.getElementById('tcMS');ms.textContent=p.stock;ms.className='tc-st '+p.sc;
  document.getElementById('tcMD').textContent=p.desc||'';
  document.getElementById('tcMBen').innerHTML=(p.benefits||[]).map(function(b){return '<li>'+b+'</li>'}).join('');
  var im=document.getElementById('tcMI');im.onerror=function(){im.onerror=null;im.src=ph();};im.src=p.img;
  document.getElementById('tcMSpec').innerHTML=(p.specs||[]).map(function(s){return '<tr><td>'+s[0]+'</td><td>'+s[1]+'</td></tr>'}).join('');
  modal.classList.add('open');
 }
 grid.addEventListener('click',function(e){var c=e.target.closest('.tc-card');if(c)open(DATA[+c.getAttribute('data-i')]);});
 document.getElementById('tcClose').onclick=function(){modal.classList.remove('open');};
 modal.addEventListener('click',function(e){if(e.target===modal)modal.classList.remove('open');});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')modal.classList.remove('open');});
 render();
})();
</script>
